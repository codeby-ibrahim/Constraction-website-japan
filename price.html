        <style>
            :root {
                --primary-color: #2c3e50;
                --secondary-color: #3498db;
                --accent-color: #33a6f3;
                --light-bg: #f8f9fa;
                --dark-bg: #1a1a1a;
            }

            body {
                font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
                background-color: var(--light-bg);
            }

            Pricing Section
            .pricing-section {
                padding: 80px 0;
                background: linear-gradient(135deg, #f8f9fa 0%, #ffffff 100%);
                position: relative;
                overflow: hidden;
            }

            .pricing-section::before {
                content: '';
                position: absolute;
                top: 0;
                right: 0;
                width: 400px;
                height: 400px;
                background: radial-gradient(circle, rgba(52, 152, 219, 0.1) 0%, transparent 70%);
                border-radius: 50%;
            }

            .section-header {
                text-align: center;
                margin-bottom: 60px;
                position: relative;
                z-index: 1;
            }

            .section-header h2 {
                font-size: clamp(2rem, 5vw, 3.5rem);
                color: var(--primary-color);
                font-weight: 700;
                margin-bottom: 15px;
                letter-spacing: -0.5px;
            }

            .section-header p {
                font-size: 1.1rem;
                color: #666;
                max-width: 600px;
                margin: 0 auto;
            }

            .pricing-cards {
                display: grid;
                grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
                gap: 30px;
                position: relative;
                z-index: 1;
            }

            .pricing-card {
                background: white;
                border-radius: 15px;
                padding: 40px 30px;
                box-shadow: 0 5px 20px rgba(0, 0, 0, 0.08);
                transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
                position: relative;
                border: 2px solid transparent;
            }

            .pricing-card:hover {
                transform: translateY(-15px);
                box-shadow: 0 20px 40px rgba(0, 0, 0, 0.15);
                border-color: var(--accent-color);
            }

            .pricing-card.featured {
                border: 2px solid var(--accent-color);
                transform: scale(1.05);
                background: linear-gradient(135deg, #ffffff 0%, #f0f7ff 100%);
            }

            .pricing-card.featured:hover {
                transform: scale(1.05) translateY(-15px);
            }

            .pricing-badge {
                position: absolute;
                top: -15px;
                right: 30px;
                background: var(--accent-color);
                color: white;
                padding: 8px 20px;
                border-radius: 50px;
                font-size: 0.85rem;
                font-weight: 700;
                text-transform: uppercase;
                letter-spacing: 1px;
            }

            .pricing-title {
                font-size: 1.5rem;
                font-weight: 700;
                color: var(--primary-color);
                margin-bottom: 15px;
            }

            .pricing-description {
                color: #666;
                font-size: 0.95rem;
                margin-bottom: 25px;
                line-height: 1.6;
            }

            .pricing-amount {
                display: flex;
                align-items: baseline;
                margin-bottom: 25px;
                gap: 8px;
            }

            .currency {
                font-size: 1.2rem;
                color: var(--accent-color);
                font-weight: 700;
            }

            .price {
                font-size: 3rem;
                font-weight: 700;
                color: var(--primary-color);
                line-height: 1;
            }

            .period {
                color: #999;
                font-size: 0.9rem;
                font-weight: 500;
            }

            .features-list {
                list-style: none;
                margin-bottom: 30px;
                padding: 0;
            }

            .features-list li {
                padding: 12px 0;
                border-bottom: 1px solid #f0f0f0;
                color: #555;
                font-size: 0.95rem;
                display: flex;
                align-items: center;
                gap: 12px;
            }

            .features-list li:last-child {
                border-bottom: none;
            }

            .features-list i {
                color: var(--accent-color);
                font-size: 1.1rem;
                flex-shrink: 0;
            }

            .cta-button {
                width: 100%;
                padding: 14px 24px;
                border: 2px solid var(--accent-color);
                background: transparent;
                color: var(--accent-color);
                font-weight: 700;
                border-radius: 8px;
                cursor: pointer;
                transition: all 0.3s ease;
                font-size: 0.95rem;
                text-transform: uppercase;
                letter-spacing: 1px;
            }

            .cta-button:hover {
                background: var(--accent-color);
                color: white;
                transform: translateY(-2px);
            }

            .pricing-card.featured .cta-button {
                background: var(--accent-color);
                color: white;
                border-color: var(--accent-color);
            }

            .pricing-card.featured .cta-button:hover {
                background: #2980b9;
                border-color: #2980b9;
            }

            .pricing-note {
                text-align: center;
                margin-top: 50px;
                color: #666;
                font-size: 0.95rem;
            }

            Responsive
            @media (max-width: 768px) {
                .pricing-section {
                    padding: 50px 0;
                }

                .pricing-cards {
                    gap: 20px;
                }

                .pricing-card {
                    padding: 30px 20px;
                }

                .pricing-card.featured {
                    transform: scale(1);
                }

                .pricing-card.featured:hover {
                    transform: translateY(-15px);
                }

                .price {
                    font-size: 2.5rem;
                }

                .section-header h2 {
                    font-size: 2rem;
                }
            }

            @media (max-width: 480px) {
                .pricing-section {
                    padding: 30px 0;
                }

                .pricing-card {
                    padding: 25px 15px;
                }

                .pricing-title {
                    font-size: 1.3rem;
                }

                .price {
                    font-size: 2rem;
                }

                .features-list li {
                    font-size: 0.85rem;
                    padding: 10px 0;
                }
            }

            .section-icon {
                display: inline-block;
                width: 50px;
                height: 50px;
                background: var(--accent-color);
                color: white;
                border-radius: 50%;
                display: flex;
                align-items: center;
                justify-content: center;
                font-size: 1.5rem;
                margin-bottom: 15px;
            }
        </style>
